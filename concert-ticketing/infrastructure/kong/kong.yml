_format_version: "2.1"
_transform: true

services:
- name: booking-service
  url: http://booking-service:5000
  routes:
  - name: booking-create
    paths:
    - /booking
    methods: ["POST"]

- name: swap-orchestration-service
  url: http://swap-orchestration-service:5000
  routes:
  - name: swap-request
    paths:
    - /swap
    methods: ["POST","DELETE"]
  - name: swap-confirm
    paths:
    - ~/swap/[^/]+/confirm$
    methods: ["POST"]

- name: events-service
  url: http://event-service:5000
  routes:
  - name: events-root
    paths:
    - /events
    methods: ["GET"]
  - name: events-id
    paths:
    - ~/events/[^/]+$
    methods: ["GET"]
  - name: events-seat
    paths:
    - ~/events/[^/]+/[^/]+$
    methods: ["GET"]

- name: order-service
  url: http://order-service:5000
  routes:
  - name: order-create
    paths:
    - /order
    methods: ["POST"]
  - name: order-confirm
    paths:
    - "~/order/[^/]+$"
    methods: ["POST"]
  - name: order-cancel
    paths:
    - "~/order/[^/]+$"
    methods: ["DELETE"]
  - name: order-swap-request
    paths:
    - "~/order/[^/]+/swap$"
    methods: ["POST"]

- name: order-admin-service
  url: http://order-service:5000
  routes:
  - name: order-admin
    paths:
    - /admin/orders

- name: seat-allocation-service
  url: http://seat-allocation-service:5000
  routes:
  - name: hold-id
    paths:
    - "~/hold/[^/]+$"
    methods: ["POST","DELETE"]

- name: payment-service
  url: http://payment-service:5000
  routes:
  - name: payment-id
    paths:
    - "~/payment/[^/]+$"
    methods: ["POST"]
  - name: payment-refund
    paths:
    - "~/payment/[^/]+/refund$"
    methods: ["POST"]
  - name: payment-adjust
    paths:
    - "~/payment/[^/]+/adjustment$"
    methods: ["POST"]

- name: notification-service
  url: http://notification-service:5000
  routes:
  - name: notification
    paths:
    - /notification
    methods: ["POST"]

plugins:
- name: file-log
  config:
    path: /dev/stdout