_format_version: "2.1"
_transform: true

services:
- name: booking-service
  url: http://booking-service:5000
  routes:
  - name: booking-create
    paths:
    - /booking
    methods: ["POST"]

- name: swap-orchestration-service
  url: http://swap-orchestration-service:5000
  routes:
  - name: swap-request
    paths:
    - /swap
    methods: ["POST","DELETE"]
  - name: swap-confirm
    paths:
    - ~/swap/[^/]+/confirm$
    methods: ["POST"]

- name: events-service
  url: http://events-service:5000
  routes:
  - name: events-collection
    paths:
    - /events
    methods: ["GET","POST"]
  - name: events-item
    paths:
    - ~/events/[^/]+$
    methods: ["GET","PUT"]
  - name: events-seats-collection
    paths:
    - ~/events/[^/]+/seats$
    methods: ["GET"]
  - name: events-seat-item
    paths:
    - ~/events/[^/]+/seats/[^/]+$
    methods: ["GET"]

- name: order-service
  url: http://order-service:5000
  routes:
  - name: orders-create
    paths:
    - /orders
    methods: ["POST"]
  - name: orders-item
    paths:
    - ~/orders/[^/]+$
    methods: ["GET"]
  - name: orders-status
    paths:
    - ~/orders/[^/]+/status$
    methods: ["PUT"]

- name: order-admin-service
  url: http://order-service:5000
  routes:
  - name: order-admin
    paths:
    - /admin/orders

- name: seat-allocation-service
  url: http://seat-allocation-service:5000
  routes:
  - name: holds-create
    paths:
    - /holds
    methods: ["POST"]
  - name: holds-item
    paths:
    - ~/holds/[^/]+$
    methods: ["DELETE"]
  - name: holds-confirm
    paths:
    - ~/holds/[^/]+/confirm$
    methods: ["POST"]

- name: payment-service
  url: http://payment-service:5000
  routes:
  - name: payments-create
    paths:
    - /payments
    methods: ["POST"]

- name: user-service
  url: http://user-service:5000
  routes:
  - name: users-create
    paths:
    - /users
    methods: ["POST"]
  - name: users-item
    paths:
    - ~/users/[^/]+$
    methods: ["GET"]

- name: notification-service
  url: http://notification-service:5000
  routes:
  - name: notification
    paths:
    - /notification
    methods: ["POST"]

plugins:
- name: file-log
  config:
    path: /dev/stdout
