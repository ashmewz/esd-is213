_format_version: "2.1"

services:

- name: booking-service
  url: http://booking-service:5000
  routes:
  - name: place-booking
    paths:
    - /place-booking
    methods: ["POST"]
    strip_path: false

- name: swap-orchestration-service
  url: http://swap-orchestration-service:5000
  routes:
  - name: swap-requests
    paths:
    - /swap-requests
    methods: ["POST"]
    strip_path: false
  - name: swap-matches
    paths:
    - /swap-matches
    methods: ["POST"]
    strip_path: false
  - name: swap-status
    paths:
    - /swap
    methods: ["GET"]
    strip_path: false

- name: events-service
  url: http://events-service:5000
  routes:
  - name: events
    paths:
    - /events
    methods: ["GET","POST","PUT"]
    strip_path: false

- name: order-service
  url: http://order-service:5000
  routes:
  - name: orders
    paths:
    - /orders
    methods: ["GET","POST","PUT"]
    strip_path: false
  - name: orders-admin
    paths:
    - /admin/orders
    methods: ["GET"]
    strip_path: false

- name: seat-allocation-service
  url: http://seat-allocation-service:5000
  routes:
  - name: holds
    paths:
    - /holds
    methods: ["GET","POST","DELETE"]
    strip_path: false

- name: payment-service
  url: http://payment-service:5000
  routes:
  - name: payments
    paths:
    - /payments
    methods: ["GET","POST"]

plugins:
- name: file-log
  config:
    path: /dev/stdout

- name: cors
  config:
    origins:
      - "http://localhost:5173"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    headers:
      - Accept
      - Content-Type
      - Authorization
    exposed_headers:
      - X-Auth-Token
    credentials: true
    max_age: 3600
