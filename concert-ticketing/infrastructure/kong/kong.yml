_format_version: "2.1"

services:

- name: booking-service
  url: http://booking-service:5000
  routes:
  - name: place-booking
    paths:
    - /place-booking
    methods: ["POST","OPTIONS"]
    strip_path: false

- name: swap-orchestration-service
  url: http://swap-orchestration-service:5000
  routes:
  - name: swap-requests
    paths:
    - /swap-requests
    methods: ["GET","POST","DELETE","OPTIONS"]
    strip_path: false
  - name: swap-matches
    paths:
    - /swap-matches
    methods: ["POST","OPTIONS"]
    strip_path: false
  - name: swap-status
    paths:
    - /swap
    methods: ["GET","OPTIONS"]
    strip_path: false
  - name: swap-status-by-request
    paths:
    - /swap/by-request
    methods: ["GET","OPTIONS"]
    strip_path: false

- name: user-service-login
  url: http://user-service:5000
  routes:
    - name: user-login
      paths:
        - /users/login
      methods: ["POST","OPTIONS"]   
      strip_path: false

- name: user-service
  url: http://user-service:5000
  routes:
    - name: users
      paths:
        - /users
      methods: ["GET","POST","DELETE","OPTIONS"]  
      strip_path: false

- name: events-service
  url: http://events-service:5000
  routes:
  - name: events
    paths:
    - /events
    methods: ["GET","POST","PUT","OPTIONS"]
    strip_path: false


- name: seat-allocation-service
  url: http://seat-allocation-service:5000
  routes:
  - name: holds
    paths:
    - /holds
    methods: ["GET","POST","DELETE","OPTIONS"]
    strip_path: false
  - name: seat-assignments
    paths:
    - /seat-assignments
    methods: ["GET","OPTIONS"]
    strip_path: false

- name: payment-service
  url: http://payment-service:5000
  routes:
  - name: payments
    paths:
    - /payments
    methods: ["GET","POST","OPTIONS"]

- name: order-service
  url: https://personal-v9ndj4pt.outsystemscloud.com/Order/rest/Order
  routes:
  - name: orders
    paths:
    - /orders
    methods: ["GET","POST","PUT","OPTIONS"]
    strip_path: false

plugins:
- name: file-log
  config:
    path: /dev/stdout

- name: cors
  config:
    origins:
      - "http://localhost:5173"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    headers:
      - Accept
      - Content-Type
      - Authorization
    exposed_headers:
      - X-Auth-Token
    credentials: true
    max_age: 3600
