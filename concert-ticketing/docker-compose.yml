services:
  # RabbitMQ ----------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # microservices ----------------------------------
  events-service:
    build: ./services/atomic/events-service
    container_name: events-service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5001:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  seat-allocation-service:
    build: ./services/atomic/seat-allocation-service
    container_name: seat-allocation-service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5002:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  swap-service:
    build: ./services/atomic/swap-service
    container_name: swap-service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5003:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./services/atomic/user-service
    container_name: user-service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5004:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  booking-service:
    build: ./services/composite/booking-service
    container_name: booking-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5005:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  swap-orchestration-service:
    build: ./services/composite/swap-orchestration-service
    container_name: swap-orchestration-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5006:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./services/wrapper/notification-service
    container_name: notification-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
    ports:
      - "5007:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # payment-service:
  #   build: ./services/wrapper/payment-service
  #   container_name: payment-service
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
  #   ports:
  #     - "5008:5000"
  #   networks:
  #     - ticketing-network
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Kong API Gateway ----------------------------------
  kong:
    build: ./infrastructure/kong
    container_name: kong
    ports:
      - "8000:8000"  # Proxy
      - "8001:8001"  # Admin
    networks:
      - ticketing-network
    depends_on:
      - events-service
      - seat-allocation-service
      - swap-service
      # - payment-service
      - notification-service
      - booking-service
    volumes:
      - ./infrastructure/kong/kong.yml:/etc/kong/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ticketing-network:
    driver: bridge