services:
  # RabbitMQ ----------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # microservices ----------------------------------
  events-service:
    build: ./services/atomic/events-service
    container_name: events-service
    restart: on-failure
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ENV=production
    ports:
      - "5001:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  seat-allocation-service:
    build: ./services/atomic/seat-allocation-service
    container_name: seat-allocation-service
    restart: on-failure
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ENV=production
    ports:
      - "5002:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  swap-service:
    build: ./services/atomic/swap-service
    container_name: swap-service
    restart: on-failure
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ENV=production
    ports:
      - "5003:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  user-service:
    build: ./services/atomic/user-service
    container_name: user-service
    restart: on-failure
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ENV=production
    ports:
      - "5004:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  order-service:
    build: ./services/atomic/order-service
    container_name: order-service
    restart: on-failure
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ENV=production
    ports:
      - "5009:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Composite services depend on atomic services being healthy ----
  booking-service:
    build: ./services/composite/booking-service
    container_name: booking-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ENV=production
    ports:
      - "5005:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      events-service:
        condition: service_healthy
      seat-allocation-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  swap-orchestration-service:
    build: ./services/composite/swap-orchestration-service
    container_name: swap-orchestration-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - ENV=production
    ports:
      - "5006:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      swap-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # notification-service:
  #   build: ./services/wrapper/notification-service
  #   container_name: notification-service
  #   environment:
  #     - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
  #     - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
  #     - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
  #     - SMTP_USER=${SMTP_USER}
  #     - SMTP_PASSWORD=${SMTP_PASSWORD}
  #     - EMAIL_FROM=${EMAIL_FROM}
  #     - ENV=production
  #   ports:
  #     - "5007:5000"
  #   networks:
  #     - ticketing-network
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 20s

  payment-service:
    build: ./services/wrapper/payment-service
    container_name: payment-service
    restart: on-failure
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - ENV=production
    ports:
      - "5008:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Kong API Gateway ----------------------------------
  kong:
    build: ./infrastructure/kong
    container_name: kong
    ports:
      - "8000:8000"  # Proxy
      - "8001:8001"  # Admin
    networks:
      - ticketing-network
    depends_on:
      events-service:
        condition: service_healthy
      seat-allocation-service:
        condition: service_healthy
      swap-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      swap-orchestration-service:
        condition: service_healthy
      # notification-service:
      #   condition: service_healthy
    volumes:
      - ./infrastructure/kong/kong.yml:/etc/kong/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ticketing-network:
    driver: bridge