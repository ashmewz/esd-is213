services:
  # RabbitMQ ----------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # databases --------------------------------------
  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orderdb
    ports:
      - "5432:5432"
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-db:
    image: postgres:15
    container_name: event-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventdb
    ports:
      - "5433:5432"
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  seat-db:
    image: postgres:15
    container_name: seat-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: seatdb
    ports:
      - "5434:5432"
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  swap-db:
    image: postgres:15
    container_name: swap-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: swapdb
    ports:
      - "5435:5432"
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:15
    container_name: payment-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: paymentdb
    ports:
      - "5436:5432"
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # microservices ----------------------------------
  events-service:
    build: ./services/events-service
    container_name: events-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@event-db:5432/eventdb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5001:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      event-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  seat-allocation-service:
    build: ./services/seat-allocation-service
    container_name: seat-allocation-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@seat-db:5432/seatdb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5003:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      seat-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  swap-service:
    build: ./services/swap-service
    container_name: swap-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@swap-db:5432/swapdb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5004:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      swap-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@payment-db:5432/paymentdb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5005:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5006:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  access-service:
    build: ./services/access-service
    container_name: access-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "5007:5000"
    networks:
      - ticketing-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kong API Gateway ----------------------------------
  kong:
    build: ./infrastructure/kong
    container_name: kong
    ports:
      - "8000:8000"  # Proxy
      - "8001:8001"  # Admin
    networks:
      - ticketing-network
    depends_on:
      - events-service
      - seat-allocation-service
      - swap-service
      - payment-service
      - notification-service
      - access-service
    volumes:
      - ./infrastructure/kong/kong.yml:/etc/kong/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ticketing-network:
    driver: bridge